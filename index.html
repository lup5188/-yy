<!DOCTYPE html>

        h1 {

            text-align: center;

            color: #2d6df6;

            margin-bottom: 20px;

        }

        p {

            font-size: 16px;

            line-height: 1.8;

            color: #333;

            margin: 10px 0;

        }

        .link {

            display: inline-block;

            color: #2d6df6;

            font-weight: bold;

            text-decoration: none;

            border-bottom: 2px solid #2d6df6;

            padding: 2px 0;

        }

        .link:hover {

            color: #ff5722;

            border-color: #ff5722;

        }

        .card {

            background: #f7f9ff;

            padding: 20px;

            border-radius: 12px;
